apiVersion: bgorch.io/v1alpha1
kind: ChainCluster
metadata:
  name: starter-local-dev
spec:
  family: generic
  profile: local-dev
  plugin: generic-process
  runtime:
    backend: docker-compose
    backendConfig:
      compose:
        projectName: starter-local-dev
        outputFile: compose.yaml
  nodePools:
    - name: validator
      replicas: 1
      roles: [validator]
      template:
        workloads:
          - name: node
            mode: container
            image: ghcr.io/example/chaind:v0.1.0
            command: ["chaind"]
            args: ["start", "--home", "/var/lib/chain"]
            ports:
              - name: p2p
                containerPort: 26656
                hostPort: 26656
              - name: rpc
                containerPort: 26657
                hostPort: 26657
            volumeMounts:
              - volume: datadir
                path: /var/lib/chain
            restartPolicy: unless-stopped
        volumes:
          - name: datadir
            type: named
